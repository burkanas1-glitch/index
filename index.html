<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteo Stotelė</title>
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0e1a;
    --card: #111827;
    --border: #1e2d45;
    --accent1: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #39ff14;
    --text: #e2e8f0;
    --muted: #4a6080;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 32px;
    animation: fadeDown 0.6s ease both;
  }

  .title {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 3px;
    color: var(--accent1);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  h1 { font-size: 28px; font-weight: 800; line-height: 1; color: var(--text); }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent3);
    margin-top: 8px;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent3);
    animation: pulse 2s infinite;
  }

  .update-time {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-align: right;
  }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .card.vidus::before { background: linear-gradient(90deg, var(--accent1), transparent); }
  .card.lauke::before { background: linear-gradient(90deg, var(--accent2), transparent); }

  .temp-display { display: flex; flex-direction: column; gap: 4px; }
  .temp-icon { font-size: 28px; margin-bottom: 4px; }

  .temp-value {
    font-family: 'Space Mono', monospace;
    font-size: 48px;
    font-weight: 700;
    line-height: 1;
    color: var(--accent1);
    transition: all 0.5s ease;
  }

  .card.lauke .temp-value { color: var(--accent2); }

  .temp-unit {
    font-size: 20px;
    color: var(--muted);
    vertical-align: super;
    font-family: 'Space Mono', monospace;
  }

  .temp-label {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    letter-spacing: 1px;
  }

  .humi-section {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .humi-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .humi-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .humi-value {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent1);
    transition: all 0.5s ease;
  }

  .card.lauke .humi-value { color: var(--accent2); }

  .humi-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }

  .humi-fill {
    height: 100%;
    background: var(--accent1);
    border-radius: 2px;
    transition: width 1s ease;
  }

  .card.lauke .humi-fill { background: var(--accent2); }

  /* Grafiko kortelė */
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }

  .chart-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .chart-card.temp-chart::before { background: linear-gradient(90deg, var(--accent1), var(--accent2), transparent); }
  .chart-card.humi-chart::before { background: linear-gradient(90deg, #4fc3f7, transparent); }

  .chart-title {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .chart-title .period-label { color: var(--accent3); font-size: 9px; }

  .chart-container { position: relative; height: 150px; }

  .chart-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .chart-stat { text-align: center; }

  .chart-stat-val {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
  }

  .chart-stat-lbl {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Valdymas */
  .controls { margin-bottom: 16px; display: flex; flex-direction: column; gap: 10px; }

  .period-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

  .period-btn {
    padding: 9px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 1px;
  }

  .period-btn:hover { border-color: var(--accent1); color: var(--accent1); }
  .period-btn.active { background: rgba(0,212,255,0.1); border-color: var(--accent1); color: var(--accent1); }

  .date-row { display: flex; align-items: center; gap: 8px; }

  .date-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
  }

  .date-input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 8px 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    color-scheme: dark;
  }

  .date-input:focus { outline: none; border-color: var(--accent1); }

  .date-btn {
    padding: 8px 14px;
    background: rgba(0,212,255,0.1);
    border: 1px solid var(--accent1);
    border-radius: 8px;
    color: var(--accent1);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .date-btn:hover { background: rgba(0,212,255,0.2); }
  .date-btn.active { background: var(--accent1); color: var(--bg); }

  .refresh-btn {
    width: 100%;
    margin-top: 24px;
    padding: 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--accent1);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.3s ease;
  }

  .refresh-btn:hover { background: rgba(0,212,255,0.05); border-color: var(--accent1); }
  .refresh-btn:active { transform: scale(0.98); }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div>
      <div class="title">ESP32 · DHT22 · ThingSpeak</div>
      <h1>Meteo<br>Stotelė</h1>
      <div class="status">
        <div class="dot"></div>
        <span id="statusText">Jungiamasi...</span>
      </div>
    </div>
    <div class="update-time">
      <div style="font-size:18px; margin-bottom:4px;">🌡️</div>
      <div id="lastUpdate">--:--</div>
      <div style="margin-top:2px; color:#1e2d45">atnaujinta</div>
    </div>
  </header>

  <div class="section-label">🏠 Vidus</div>
  <div class="card vidus" style="animation: fadeUp 0.6s ease 0.1s both; margin-bottom: 12px;">
    <div class="temp-display">
      <div class="temp-icon">🌡️</div>
      <div>
        <span class="temp-value" id="vidTemp">--</span>
        <span class="temp-unit">°C</span>
      </div>
      <div class="temp-label">TEMPERATŪRA</div>
    </div>
    <div class="humi-section">
      <div class="humi-header">
        <span class="humi-label">💧 DRĖGMĖ</span>
        <span class="humi-value" id="vidHumi">--%</span>
      </div>
      <div class="humi-bar">
        <div class="humi-fill" id="vidHumiBar" style="width:0%"></div>
      </div>
    </div>
  </div>

  <div class="section-label">🌿 Laukas</div>
  <div class="card lauke" style="animation: fadeUp 0.6s ease 0.2s both; margin-bottom: 32px;">
    <div class="temp-display">
      <div class="temp-icon">🌤️</div>
      <div>
        <span class="temp-value" id="laukTemp">--</span>
        <span class="temp-unit">°C</span>
      </div>
      <div class="temp-label">TEMPERATŪRA</div>
    </div>
    <div class="humi-section">
      <div class="humi-header">
        <span class="humi-label">💧 DRĖGMĖ</span>
        <span class="humi-value" id="laukHumi">--%</span>
      </div>
      <div class="humi-bar">
        <div class="humi-fill" id="laukHumiBar" style="width:0%"></div>
      </div>
    </div>
  </div>

  <div style="animation: fadeUp 0.6s ease 0.3s both;">
    <div class="section-label">📈 Istorija</div>

    <div class="controls">
      <div class="period-btns">
        <button class="period-btn active" onclick="setPeriod('1H', this)">1H</button>
        <button class="period-btn" onclick="setPeriod('12H', this)">12H</button>
        <button class="period-btn" onclick="setPeriod('24H', this)">24H</button>
      </div>
      <div class="date-row">
        <span class="date-label">📅 DATA:</span>
        <input type="date" class="date-input" id="datePicker">
        <button class="date-btn" id="dateBtn" onclick="setDate()">Rodyti</button>
      </div>
    </div>

    <div class="chart-card temp-chart">
      <div class="chart-title">
        🌡️ Temperatūra
        <span class="period-label" id="tempPeriodLabel">PASKUTINĖ 1H</span>
      </div>
      <div class="chart-container">
        <canvas id="tempChart"></canvas>
      </div>
      <div class="chart-stats">
        <div class="chart-stat">
          <div class="chart-stat-val" id="tempMin" style="color:#4fc3f7">--°</div>
          <div class="chart-stat-lbl">MIN</div>
        </div>
        <div class="chart-stat">
          <div class="chart-stat-val" id="tempAvg" style="color:var(--text)">--°</div>
          <div class="chart-stat-lbl">VIDURKIS</div>
        </div>
        <div class="chart-stat">
          <div class="chart-stat-val" id="tempMax" style="color:var(--accent2)">--°</div>
          <div class="chart-stat-lbl">MAX</div>
        </div>
      </div>
    </div>

    <div class="chart-card humi-chart">
      <div class="chart-title">
        💧 Drėgmė
        <span class="period-label" id="humiPeriodLabel">PASKUTINĖ 1H</span>
      </div>
      <div class="chart-container">
        <canvas id="humiChart"></canvas>
      </div>
      <div class="chart-stats">
        <div class="chart-stat">
          <div class="chart-stat-val" id="humiMin" style="color:#4fc3f7">--%</div>
          <div class="chart-stat-lbl">MIN</div>
        </div>
        <div class="chart-stat">
          <div class="chart-stat-val" id="humiAvg" style="color:var(--text)">--%</div>
          <div class="chart-stat-lbl">VIDURKIS</div>
        </div>
        <div class="chart-stat">
          <div class="chart-stat-val" id="humiMax" style="color:var(--accent2)">--%</div>
          <div class="chart-stat-lbl">MAX</div>
        </div>
      </div>
    </div>
  </div>

  <button class="refresh-btn" onclick="fetchData()" id="refreshBtn">
    ↻ &nbsp; Atnaujinti duomenis
  </button>

</div>

<script>
const CHANNEL_ID = '3294006';
const READ_API_KEY = 'Y67A8GD4V5FINMWW';

let mode = 'period';
let currentPeriod = '1H';

const periodMap = {
  '1H':  { results: 60,   label: 'PASKUTINĖ 1H'  },
  '12H': { results: 720,  label: 'PASKUTINĖS 12H' },
  '24H': { results: 1440, label: 'PASKUTINĖS 24H' }
};

const picker = document.getElementById('datePicker');
const today = new Date().toISOString().split('T')[0];
picker.value = today;
picker.max = today;

Chart.defaults.color = '#4a6080';
Chart.defaults.font.family = "'Space Mono', monospace";
Chart.defaults.font.size = 9;

const chartOptions = (yLabel) => ({
  responsive: true,
  maintainAspectRatio: false,
  animation: { duration: 600 },
  plugins: {
    legend: { display: true, position: 'top', labels: { boxWidth: 8, boxHeight: 8, padding: 12, font: { size: 9 } } },
    tooltip: { backgroundColor: '#111827', borderColor: '#1e2d45', borderWidth: 1 }
  },
  scales: {
    x: { grid: { color: 'rgba(30,45,69,0.5)' }, ticks: { maxTicksLimit: 6, maxRotation: 0 } },
    y: { grid: { color: 'rgba(30,45,69,0.5)' }, ticks: { callback: v => v + yLabel } }
  }
});

const makeDataset = (label, color) => ({
  label, data: [],
  borderColor: color,
  backgroundColor: color + '15',
  borderWidth: 2, pointRadius: 2, tension: 0.4, fill: true, spanGaps: true,
});

const tempChart = new Chart(document.getElementById('tempChart').getContext('2d'), {
  type: 'line',
  data: { labels: [], datasets: [ makeDataset('Vidus °C', '#00d4ff'), makeDataset('Laukas °C', '#ff6b35') ] },
  options: chartOptions('°')
});

const humiChart = new Chart(document.getElementById('humiChart').getContext('2d'), {
  type: 'line',
  data: { labels: [], datasets: [ makeDataset('Vidus %', '#00d4ff'), makeDataset('Laukas %', '#ff6b35') ] },
  options: chartOptions('%')
});

function setPeriod(period, btn) {
  mode = 'period';
  currentPeriod = period;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('dateBtn').classList.remove('active');
  const label = periodMap[period].label;
  document.getElementById('tempPeriodLabel').textContent = label;
  document.getElementById('humiPeriodLabel').textContent = label;
  fetchCharts();
}

function setDate() {
  const val = picker.value;
  if (!val) return;
  mode = 'date';
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('dateBtn').classList.add('active');
  document.getElementById('tempPeriodLabel').textContent = val;
  document.getElementById('humiPeriodLabel').textContent = val;
  fetchCharts();
}

async function fetchCharts() {
  let url;
  if (mode === 'date') {
    const date = picker.value;
    url = `https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds.json?api_key=${READ_API_KEY}&start=${date}T00:00:00Z&end=${date}T23:59:59Z&results=8000`;
  } else {
    url = `https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds.json?api_key=${READ_API_KEY}&results=${periodMap[currentPeriod].results}`;
  }

  try {
    const res = await fetch(url);
    const data = await res.json();
    const feeds = data.feeds || [];

    const labels = [], vTemps = [], vHumis = [], lTemps = [], lHumis = [];
    feeds.forEach(f => {
      const t = new Date(f.created_at);
      labels.push(t.toLocaleTimeString('lt-LT', {hour:'2-digit', minute:'2-digit'}));
      vTemps.push(f.field1 ? parseFloat(f.field1) : null);
      vHumis.push(f.field2 ? parseFloat(f.field2) : null);
      lTemps.push(f.field3 ? parseFloat(f.field3) : null);
      lHumis.push(f.field4 ? parseFloat(f.field4) : null);
    });

    tempChart.data.labels = labels;
    tempChart.data.datasets[0].data = vTemps;
    tempChart.data.datasets[1].data = lTemps;
    tempChart.update();

    humiChart.data.labels = labels;
    humiChart.data.datasets[0].data = vHumis;
    humiChart.data.datasets[1].data = lHumis;
    humiChart.update();

    const validVT = vTemps.filter(v => v !== null);
    if (validVT.length) {
      document.getElementById('tempMin').textContent = Math.min(...validVT).toFixed(1) + '°';
      document.getElementById('tempMax').textContent = Math.max(...validVT).toFixed(1) + '°';
      document.getElementById('tempAvg').textContent = (validVT.reduce((a,b)=>a+b,0)/validVT.length).toFixed(1) + '°';
    }

    const validVH = vHumis.filter(v => v !== null);
    if (validVH.length) {
      document.getElementById('humiMin').textContent = Math.min(...validVH).toFixed(0) + '%';
      document.getElementById('humiMax').textContent = Math.max(...validVH).toFixed(0) + '%';
      document.getElementById('humiAvg').textContent = (validVH.reduce((a,b)=>a+b,0)/validVH.length).toFixed(0) + '%';
    }
  } catch(e) { console.error('Chart klaida:', e); }
}

async function fetchData() {
  const btn = document.getElementById('refreshBtn');
  btn.textContent = '↻  Kraunama...';
  btn.style.opacity = '0.5';
  document.getElementById('statusText').textContent = 'Atnaujinama...';

  try {
    const res = await fetch(`https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds.json?api_key=${READ_API_KEY}&results=8`);
    const data = await res.json();
    const feeds = data.feeds || [];

    const getLatest = (field) => {
      for (let i = feeds.length - 1; i >= 0; i--)
        if (feeds[i][field] !== null && feeds[i][field] !== undefined)
          return parseFloat(feeds[i][field]);
      return NaN;
    };

    const vT = getLatest('field1'), vH = getLatest('field2');
    const lT = getLatest('field3'), lH = getLatest('field4');

    document.getElementById('vidTemp').textContent = isNaN(vT) ? '--' : vT.toFixed(1);
    document.getElementById('vidHumi').textContent = isNaN(vH) ? '--%' : vH.toFixed(1) + '%';
    document.getElementById('vidHumiBar').style.width = isNaN(vH) ? '0%' : vH + '%';
    document.getElementById('laukTemp').textContent = isNaN(lT) ? '--' : lT.toFixed(1);
    document.getElementById('laukHumi').textContent = isNaN(lH) ? '--%' : lH.toFixed(1) + '%';
    document.getElementById('laukHumiBar').style.width = isNaN(lH) ? '0%' : lH + '%';

    const now = new Date();
    document.getElementById('lastUpdate').textContent = now.toLocaleTimeString('lt-LT', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('statusText').textContent = 'Gyvas · ' + now.toLocaleDateString('lt-LT');

  } catch(e) {
    document.getElementById('statusText').textContent = 'Klaida · Tikrink API raktą';
  }

  btn.textContent = '↻  Atnaujinti duomenis';
  btn.style.opacity = '1';
}

fetchData();
fetchCharts();
setInterval(fetchData, 30000);
setInterval(fetchCharts, 60000);
</script>
</body>
</html>
